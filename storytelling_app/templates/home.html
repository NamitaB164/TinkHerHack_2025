<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatty - Welcome Little Explorer!</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #6a4c9c;
            --lavender-light: #f3e5f5;
            --lavender-mid: #e1bee7;
            --accent-pink: #ff80ab;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 50%, #d1c4e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--primary-purple);
        }

        /* Magic Floating Bubbles Background */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
            opacity: 0.5;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            30% { opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 70px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow);
            text-align: center;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .sparkle-logo {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: rotate 4s infinite linear;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(0deg); }
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(45deg, #6a4c9c, #ff80ab);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p {
            font-size: 1.4rem;
            color: #554466;
            margin: 15px 0 40px 0;
            line-height: 1.6;
        }

        .grid-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-link {
            text-decoration: none;
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            background: linear-gradient(to right, #6a4c9c, #9b6bcf);
            font-weight: 600;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(106, 76, 156, 0.3);
        }

        .app-link:hover {
            transform: scale(1.05);
            background: linear-gradient(to right, #7e57c2, #ba68c8);
            box-shadow: 0 8px 25px rgba(106, 76, 156, 0.4);
        }

        .app-link span {
            font-size: 1.5rem;
        }

        .footer-tag {
            font-size: 1rem;
            color: rgba(106, 76, 156, 0.6);
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="magic-bg" id="magic-bg"></div>

    <div class="card">
        <div class="sparkle-logo">✨</div>
        <h1>Chatty!</h1>
        <p>A world of magic stories and friendship made just for you!</p>
        
        <div class="grid-links">
            <a href="/storyteller/" class="app-link">
                <span>📖</span> Story Box
            </a>
            <a href="/chat/" class="app-link" style="background: linear-gradient(to right, #9b6bcf, #ff80ab);">
                <span>👾</span> My Friend
            </a>
        </div>

        <div class="footer-tag">Made with 💜 just for explorers</div>
    </div>

    <script>
        // Dynamically create floating bubbles
        const bg = document.getElementById('magic-bg');
        const colors = ['#ffffff', '#f48fb1', '#ce93d8', '#b39ddb'];
        
        for (let i = 0; i < 20; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.bottom = '-' + size + 'px';
            bubble.style.animationDuration = (Math.random() * 4 + 4) + 's';
            bubble.style.animationDelay = (Math.random() * 5) + 's';
            bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
            bg.appendChild(bubble);
        }
    </script>
</body>
</html>
